spack:
  include:
    - $spack/../environments/packages.yaml
    - $spack/../environments/modules.yaml
    - $spack/../environments/concretizer.yaml
  config:
    build_stage:
      - $spack/var/spack/stage
  specs:
    - boost
    - eigen
    - fastjet
    - genfit
    - gsl
    - kitrack
    - libxml2
    - log4cxx
    - mysql@5.6.43
    - rave
    - star-env@0.4.0
    - star-table
    - vc@0.7.4
    - root@6.24.06 ~vc ~vmc
    - clhep
    - g4ensdfstate@2.2
    - g4neutronxs@1.4
    - g4photonevaporation@5.3
    - g4saiddata@2.0
    - geant4@10.5.1
    - geant4-vmc@5-0-p5
    - geant3@3-9-p1
    - vmc@1-0-p3
  packages:
    all:
      target: [x86_64]
  view: false
